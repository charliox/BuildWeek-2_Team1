<!doctype html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <!--=============== Bootstrap cdn ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!--=============== style ===============-->
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <!--=============== Header ===============-->
    <header class="sticky-top ">
        <!--=============== Navbar ===============-->
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid px-md-2 px-lg-5">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="assets/imgs/logo-pink.png" alt="Logo" width="100">
                </a>

                <div class="text-center" id="navbarNavLinks">
                    <ul class="nav justify-content-center fw-medium gap-2">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" role="button" aria-expanded="false">
                                Places to stay
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" role="button" aria-expanded="false">
                                Experiences
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" role="button" aria-expanded="false">
                                Online Experiences
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="d-flex align-items-center gap-1 gap-lg-2">
                    <a href="" class="nav-link fw-medium">Become a Host</a>
                    <a href="#" class="nav-link text-secondary position-relative">

                        <i class="fa-solid fa-globe"></i>
                    </a>
                    <button class="nav-toggler border-0" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNavLinks" aria-controls="navbarNavLinks" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <i class="fa-solid fa-bars btn-toggler"></i>
                    </button>

                </div>
            </div>
        </nav>

        <!--=============== Search bar ===============-->
        <div class="search-bar d-flex justify-content-center align-items-center mb-3">
            <div class="search-section d-flex flex-column">
                <label for="search-destination" class="text-nowrap">Location</label>
                <input type="text" class="text-truncate" id="search-destination" placeholder="Cerca destinazioni">
            </div>
            <div class="search-section d-flex flex-column">
                <label for="search-date" class="text-nowrap">Check-in</label>
                <input type="date" id="search-date" placeholder=" aggiungi date">
            </div>
            <div class="search-section d-flex flex-column">
                <label for="search-date" class="text-nowrap">Check-out</label>
                <input type="date" id="search-date" placeholder=" aggiungi date">
            </div>
            <div class="search-section d-flex flex-column">
                <label for="search-for" class="text-nowrap">Guests</label>
                <input type="number" class="text-truncate" id="search-for" placeholder=" Aggiungi ospiti1">
            </div>
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>


    </header>

    <main>
        <!--=============== Home page ===============-->
        <section class="" id="home-page">
            <!--=============== Hero ===============-->
            <div class="d-flex align-items-center" id="hero">
                <div class="container-fluid px-4">
                    <div class="d-flex flex-column align-items-baseline">
                        <svg viewBox="0 0 800 110" class="mb-3 mb-md-5">
                            <text x="0%" y="100" d text-anchor="start">
                                Go near
                            </text>
                        </svg>
                        <a href="" class="btn fw-medium liquid"><span>Explore nearby stays</span></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!--=============== Bootstrap script ===============-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!--=============== Font Awesome ===============-->
    <script src="https://kit.fontawesome.com/49727d7509.js" crossorigin="anonymous"></script>

    <!--=============== Script ===============-->
    <script src="assets/js/script.js"></script>
</body>

</html>
